- question: "❤️ Per què Copán?"
  answer: "Copán va ser un dels primers llocs que vam visitar junts com a parella, quan en Gerard va venir a Hondures per primer cop. Tots dos ens vam enamorar d'aquest lloc i significa moltíssim per a nosaltres. A més, és un poble preciós, amb un munt d'[activitats i llocs per visitar](/ca/traveling/)."

- question: "✈️ Com s'arriba a Copán Ruinas?"
  answer: "Fes un cop d'ull a la nostra [pàgina de viatges](/ca/traveling/) per a més detalls. També pots [contactar amb la nostra agent de viatges](/ca/traveling/#travel-agent) perquè t'ajudi a programar un bus compartit des de l'aeroport de San Pedro Sula (SAP) fins a Copán."

- question: "🗺️ On puc viatjar a Hondures? Algú em pot ajudar a planificar?"
  answer: "Sí! La nostra agent de viatges de confiança, Maureen Alfaro de D'Mundo Travel, et pot ajudar a reservar paquets de vacances per Hondures, hotels a Copán i busos compartits des de l'aeroport de San Pedro Sula. Menciona el codi **Casas Paz** per obtenir un 5% de descompte! [Contacta-la aquí](/ca/traveling/#travel-agent)."

- question: "🌤️ Quin temps hi farà?"
  answer: "Esperem un temps primaveral fantàstic! Dies agradables (~25 °C) i nits fresques (~16 °C). És l'inici de la temporada seca, així que és poc probable que plogui. Us recomanem portar una jaqueta lleugera o un jersei per als vespres."

- question: "👗 Com hem d'anar vestits?"
  answer: "**Formal.** Ens agradaria veure-us a tots ben elegants per celebrar-ho junts. Veniu preparats per ballar i passar-ho bé! Homes: Vestit de colors foscos amb camisa, corbata/llacet opcional i sabates elegants. Dones: Vestit llarg, vestit de còctel elegant o vestit sastre elegant."

- question: "🌍 Què passa si no puc anar a Hondures?"
  answer: "No patiu, sabem que és un viatge complicat! Per això, a la primavera del 2027 organitzarem una  celebració informal a Catalunya. Sense cerimònia: només un sopar amb amics. Us en donarem més detalls aviat!"

- question: "🍹 Farem alguna cosa divendres?"
  answer: "👀 Segurament quedarem per fer una copa la nit abans en algun bar de Copán Ruinas. Us mantindrem informats!"

- question: "🛡️ És segur viatjar-hi?"
  answer: "Tot i que Hondures té una reputació complexa, **Copán Ruinas es considera una de les destinacions turístiques més segures i tranquil·les** del país. Recomanem llegir la [nostra guia de viatge](/ca/traveling/) per a més informació. Com en qualsevol lloc turístic, us recomanem fer servir el sentit comú i no lluir joies cridaneres."

- question: "🦟?"
  answer: "Els mosquits són habituals a les zones tropicals com Hondures, menys al desembre, però n'hi ha sempre. Recomanem que porteu **repel·lent d'insectes** per evitar picades (el dengue és present al país). Llegiu [la nostra guia de viatge](/ca/traveling/) per a més informació."

- question: "🎁 Llista de noces?"
  answer: "Ens fa moltíssima il·lusió que vingueu! De debò, només cal que vingueu ❤️. Però si _realment_ voleu fer-nos un regal, ens podeu ajudar a fer que el nostre viatge de noces sigui inoblidable **[aquí 😊](https://donate.stripe.com/dRm00igIzfOB2YMbn90Ny01?locale=es)** (o [en dòlars](https://donate.stripe.com/eVq5kCgIz9qdfLycrd0Ny00?locale=es)). _Sou de la vella escola?_ També acceptarem sobres amb molt de gust al casament 💌."

- question: "🏨 Hi ha reserva de grup als hotels?"
  answer: "Sí! Consulta la [secció On allotjar-se](/ca/traveling/#where-to-stay) per veure les opcions disponibles, tarifes i com reservar."
