- question: "❤️ ¿Por qué Copán?"
  answer: "Copán fue uno de los primeros lugares que visitamos juntos como pareja, cuando Gerard vino a Honduras por primera vez. Los dos nos enamoramos de este lugar y significa muchísimo para nosotros. Además, es un pueblo precioso con un montón de [actividades y lugares para visitar](/es/traveling/)."

- question: "✈️ ¿Cómo llego a Copán Ruinas?"
  answer: "Echa un vistazo a nuestra [página de viajes](/es/traveling/) para más detalles. También puedes [contactar a nuestra agente de viajes](/es/traveling/#travel-agent) para que te ayude a programar un bus compartido desde el aeropuerto de San Pedro Sula (SAP) hasta Copán."

- question: "🗺️ ¿Dónde puedo viajar en Honduras? ¿Alguien me puede ayudar a planificar?"
  answer: "¡Sí! Nuestra agente de viajes de confianza, Maureen Alfaro de D'Mundo Travel, puede ayudarte a reservar paquetes vacacionales por Honduras, hoteles en Copán y buses compartidos desde el aeropuerto de San Pedro Sula. ¡Menciona el código **Casas Paz** para obtener 5% de descuento! [Contáctala aquí](/es/traveling/#travel-agent)."

- question: "🌤️ ¿Qué tiempo hará?"
  answer: "¡Esperamos un clima primaveral precioso! Días agradables (~25°C) y noches frescas (~16°C). Al ser el inicio de la temporada seca, es poco probable que llueva. Recomendamos traer una chaqueta ligera o suéter para las noches."

- question: "👗 ¿Cuál es el código de vestimenta?"
  answer: "**Formal.** Queremos que todos se vean guapos y elegantes para celebrar con nosotros. ¡Vengan listos para bailar y disfrutar! Hombres: Traje de color oscuro con camisa, corbata o corbatín opcional y zapatos elegantes. Mujeres: Vestido largo, vestido de cóctel elegante o traje sastre."

- question: "🌍 ¿Qué pasa si no puedo ir a Honduras?"
  answer: "No se preocupen, ¡sabemos que es un viaje largo! Por eso, en primavera de 2027 organizaremos una celebración informal en Cataluña. Sin ceremonia, solo celebración y amigos. ¡Pronto daremos más detalles!"

- question: "🍹 ¿Habrá algo el viernes?"
  answer: "👀 Probablemente iremos a tomar algo la noche anterior en algún bar de Copán Ruinas, ideal para quienes ya hayan llegado. ¡Les avisaremos con los detalles!"

- question: "🛡️ ¿Es seguro viajar a Honduras?"
  answer: "Aunque Honduras tiene una reputación complicada, **Copán Ruinas se considera uno de los destinos más seguros y tranquilos** del país. Recomendamos leer nuestra [guía de viaje](/es/traveling/) para más información. Como en cualquier lugar turístico, recomendamos sentido común y no llevar joyas muy llamativas."

- question: "🦟?"
  answer: "Los mosquitos son habituales en las zonas tropicales como Honduras, menos en diciembre pero siempre hay. Recomendamos traer **repelente de insectos** para evitar picaduras (el dengue está presente en el país). Lee nuestra [guía de viaje](/es/traveling/) para más información."

- question: "🎁 ¿Regalos?"
  answer: "¡Estamos muy felices de que nos acompañen! En serio, ¡solo vengan! ❤️ Pero si _realmente_ quieren regalarnos algo, pueden ayudarnos a que nuestro viaje de novios sea inolvidable **[aquí 😊](https://donate.stripe.com/dRm00igIzfOB2YMbn90Ny01?locale=es-419)** (o [en dólares](https://donate.stripe.com/eVq5kCgIz9qdfLycrd0Ny00?locale=es-419)). _¿A la antigua?_ También aceptaremos sobres con gusto en la boda 💌."

- question: "🏨 ¿Hay hoteles recomendados?"
  answer: "¡Sí! Mira la [sección Dónde alojarse](/es/traveling/#where-to-stay) para ver las opciones disponibles, tarifas y cómo reservar."
